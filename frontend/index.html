<!DOCTYPE html>
<html>
<head><title>HIMS</title></head>
<body>
<h1>HIMS Login</h1>
<button onclick="login()">Login</button>
<script>
async function login(){
 const res = await fetch('http://localhost:4000/login',{method:'POST'});
 const data = await res.json();
 localStorage.setItem('token', data.token);
 alert('Logged in');
}
</script>
</body>
</html>
